<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="160" fill="#0d1117"/>

    <style>
      .bar {
        fill: url(#grad);
        transform-origin: bottom;
        animation: eq 1.2s ease-in-out infinite;
      }

      .bar:nth-child(2) { animation-delay: 0.1s; }
      .bar:nth-child(3) { animation-delay: 0.25s; }
      .bar:nth-child(4) { animation-delay: 0.05s; }
      .bar:nth-child(5) { animation-delay: 0.35s; }
      .bar:nth-child(6) { animation-delay: 0.18s; }
      .bar:nth-child(7) { animation-delay: 0.42s; }
      .bar:nth-child(8) { animation-delay: 0.12s; }

      @keyframes eq {
        0%, 100% { transform: scaleY(0.35); }
        50% { transform: scaleY(1); }
      }
    </style>

    <defs>
      <linearGradient id="grad" x1="0" y1="160" x2="0" y2="0">
        <stop offset="0%" stop-color="#00f5ff"/>
        <stop offset="50%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#ff2bd6"/>
      </linearGradient>
    </defs>

    <g transform="translate(120, 30)">
      <rect class="bar" x="0"   y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="45"  y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="90"  y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="135" y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="180" y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="225" y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="270" y="20" width="28" height="100" rx="8"/>
      <rect class="bar" x="315" y="20" width="28" height="100" rx="8"/>
    </g>
  </svg>

  Then in your README.md:

  <h1 align="center">Hi, I'm Sarel</h1>

  <p align="center">
    <img src="./assets/audio-eq.svg" width="600" alt="Audio visualizer EQ" />
  </p>

  Alternative: GIF
  Make or download an animated EQ GIF and embed it:

  <p align="center">
    <img src="./assets/audio-visualizer.gif" width="600" />
  </p>

  GIFs are easy, but SVG is sharper and usually smaller.

  Important GitHub note
  GitHub strips some JavaScript and unsafe SVG behavior, so avoid JS-based visualizers. Use pure SVG/CSS animation
  or a GIF.

  A good README layout would be:

  <h1 align="center">Sarel</h1>

  <p align="center">
    <img src="./assets/audio-eq.svg" width="650" alt="Animated audio equalizer" />
  </p>

  <p align="center">
    Developer | Designer | Builder
  </p>
