<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="grad" x1="0" y1="160" x2="0" y2="0">
        <stop offset="0%" stop-color="#00f5ff"/>
        <stop offset="50%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#ff2bd6"/>
      </linearGradient>
    </defs>

    <style>
      .bar {
        fill: url(#grad);
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: eq 1.2s ease-in-out infinite;
      }

      .b1 { animation-delay: 0s; }
      .b2 { animation-delay: 0.1s; }
      .b3 { animation-delay: 0.25s; }
      .b4 { animation-delay: 0.05s; }
      .b5 { animation-delay: 0.35s; }
      .b6 { animation-delay: 0.18s; }
      .b7 { animation-delay: 0.42s; }
      .b8 { animation-delay: 0.12s; }

      @keyframes eq {
        0%, 100% { transform: scaleY(0.35); }
        50% { transform: scaleY(1); }
      }
    </style>

    <rect width="600" height="160" fill="#0d1117"/>

    <g transform="translate(120, 30)">
      <rect class="bar b1" x="0" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b2" x="45" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b3" x="90" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b4" x="135" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b5" x="180" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b6" x="225" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b7" x="270" y="20" width="28" height="100" rx="8"/>
      <rect class="bar b8" x="315" y="20" width="28" height="100" rx="8"/>
    </g>
  </svg>
